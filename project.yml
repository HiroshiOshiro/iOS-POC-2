name: iOS-POC-2
options:
  bundleIdPrefix: com.example
  developmentLanguage: ja
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
packages:
  Feature:
    path: Packages/Feature
  Core:
    path: Packages/Core
  Factory:
    url: https://github.com/hmlongco/Factory.git
    from: 3.3.2
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  iOS-POC-2:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - iOS-POC-2
    dependencies:
      - package: Feature
        product: Feature
      # 合成ルートとして ObjC 実装を Factory に登録するための依存。
      - package: Core
        product: Data
      - package: Factory
        product: FactoryKit
    scheme:
      testTargets:
        - iOS-POC-2Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.iOS-POC-2
        INFOPLIST_FILE: iOS-POC-2/Info.plist
        # POC のため AppIcon は未設定（アセットカタログの AppIcon 要求を無効化）
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CLANG_ENABLE_MODULES: YES
        # Swift 相互運用の準備（POC で一部を Swift 化する際に使用）
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: iOS-POC-2/iOS-POC-2-Bridging-Header.h
        SWIFT_OBJC_INTERFACE_HEADER_NAME: iOS-POC-2-Swift.h

  # Keychain はホストアプリが無いと entitlement 不足（-34018）で使えないため、
  # アプリをテストホストにしたユニットテストターゲットで検証する。
  iOS-POC-2Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Tests
    dependencies:
      - target: iOS-POC-2
      - package: Core
        product: Datastore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.iOS-POC-2.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
